<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>動画登録 | 軌跡</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-require-auth>
  <header class="site-header">
    <div class="app-shell header-inner">
      <a class="brand" href="dashboard.html"><span class="brand-mark">軌</span><span>軌跡<small>今日の動画と写真を登録する</small></span></a>
      <nav class="main-nav" aria-label="メインナビゲーション">
        <a href="dashboard.html">ホーム</a>
        <a href="harvest-admin.html">軌跡を登録</a>
        <a href="profile.html">プロフィール</a>
        <a href="records.html" data-records-link>最近の様子</a>
        <a href="analytics.html">アクセス解析</a>
        <button type="button" data-logout>ログアウト</button>
      </nav>
    </div>
  </header>
  <main class="app-shell">
    <section class="section form-card">
      <p class="eyebrow">今日の軌跡</p>
      <h1>動画と写真を登録する</h1>
      <p class="lead">複数動画を選んだ順につなぎます。最大5本。登録処理に一定の時間がかかります。</p>
    </section>

    <section class="section form-card" data-harvest-composer>
      <h2>動画を選ぶ</h2>
      <div class="field">
        <label for="clipVideos">動画を1〜5本選ぶ</label>
        <input id="clipVideos" type="file" accept="video/*" multiple data-composer-input />
        <p class="harvest-field-note">音声は動画の音声が再生されます。</p>
      </div>
      <div class="harvest-composer-summary" data-composer-summary>動画はまだ選択されていません。</div>
      <div class="harvest-composer-warnings" data-composer-warnings hidden></div>
      <div class="harvest-composer-list" data-composer-list></div>
      <div class="actions">
        <button class="button primary-button" type="button" data-composer-generate disabled>動画をつなぐ</button>
        <button class="button" type="button" data-use-selected-video disabled>この動画を登録対象にする</button>
        <button class="button" type="button" data-composer-reset>選び直す</button>
      </div>
      <div class="harvest-composer-progress" data-composer-progress hidden>
        <p data-composer-phase>動画処理を準備中</p>
        <progress value="0" max="100" data-composer-progress-bar></progress>
        <p class="harvest-field-note"><span data-composer-progress-percent>0%</span> / <span data-composer-elapsed>0秒</span><br />処理中は画面を閉じないでください。</p>
        <button class="button" type="button" data-composer-cancel>処理をキャンセル</button>
      </div>
      <div class="harvest-composer-result" data-composer-result hidden>
        <h3>登録する動画プレビュー</h3>
        <video class="harvest-admin-preview-video" controls playsinline data-composer-result-video></video>
        <dl class="harvest-composer-result-meta" data-composer-result-meta></dl>
        <div class="actions">
          <button class="button primary-button" type="button" data-composer-use>この動画を登録対象にする</button>
          <button class="button" type="button" data-composer-remake>作り直す</button>
          <a class="button" href="#" download="kiseki-composed.mp4" data-composer-download>動画をダウンロード</a>
        </div>
      </div>
    </section>

    <form class="section form-card harvest-admin-form" data-harvest-form>
      <p class="eyebrow">公開内容</p>
      <div class="field">
        <label for="harvestDate">投稿日</label>
        <input id="harvestDate" name="date" type="date" required />
      </div>
      <div class="field">
        <label for="existingHarvestRecord">登録済みの投稿日</label>
        <select id="existingHarvestRecord" data-existing-record-select>
          <option value="">登録済みの投稿日を選択</option>
        </select>
        <p class="harvest-field-note" data-existing-record-note>選択すると内容を読み込みます。</p>
      </div>
      <div class="field">
        <label for="harvestTitle">タイトル</label>
        <input id="harvestTitle" name="title" placeholder="例：今朝の仕事場から" />
      </div>
      <div class="field">
        <label for="harvestNote">ひとこと</label>
        <textarea id="harvestNote" name="note" maxlength="160" placeholder="今日の様子や、見てほしいところを一言で。"></textarea>
      </div>
      <div class="field">
        <label>登録する動画</label>
        <div data-video-preview><p class="note">動画の下に表示されます。複数枚添えられます。最初の写真はサムネイルにも使われます。</p></div>
        <div class="actions harvest-edit-actions">
          <button class="button" type="button" data-clear-video hidden>登録済み動画を削除</button>
        </div>
      </div>
      <div class="field">
        <label for="harvestPhotos">写真ギャラリー</label>
        <input id="harvestPhotos" type="file" accept="image/*" multiple data-harvest-photos />
        <div class="harvest-photo-preview-grid" data-photo-preview></div>
        <div class="actions harvest-edit-actions">
          <button class="button" type="button" data-clear-photos hidden>登録済み写真を削除</button>
        </div>
      </div>
      <div class="actions">
        <button class="button primary-button" type="submit">保存してQRコードを発行します</button>
        <button class="button danger-button" type="button" data-delete-harvest hidden>この投稿日を削除</button>
      </div>
      <p class="status" data-harvest-status role="status"></p>
      <div class="qr-box" data-qr-box hidden>
        <canvas data-qr-canvas></canvas>
        <p class="note" data-qr-url></p>
        <div class="actions">
          <button class="button" type="button" data-copy-url>公開URLをコピー</button>
          <button class="button" type="button" data-download-qr>QRコード画像をダウンロード</button>
          <a class="button" href="#" target="_blank" rel="noopener" data-open-public>公開ページを開く</a>
        </div>
      </div>
    </form>
  </main>
  <script src="js/qrcode.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/video-composer.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
