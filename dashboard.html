<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ダッシュボード | 軌跡</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-require-auth>
  <header class="site-header">
    <div class="app-shell header-inner">
      <a class="brand" href="dashboard.html"><span class="brand-mark">軌</span><span>軌跡<small data-current-farm>作り手管理</small></span></a>
      <nav class="main-nav" aria-label="メインナビゲーション">
        <a href="dashboard.html">ホーム</a>
        <a href="harvest-admin.html">軌跡を登録</a>
        <a href="profile.html">プロフィール</a>
        <a href="records.html" data-records-link>最近の様子</a>
        <a href="analytics.html">アクセス解析</a>
        <button type="button" data-logout>ログアウト</button>
      </nav>
    </div>
  </header>
  <main class="app-shell">
    <section class="section form-card">
      <p class="eyebrow">管理画面</p>
      <h1>今日の軌跡を管理する</h1>
      <p class="lead">動画・写真を登録してQRページを発行します。プロフィールや最近の記録もここから確認できます。</p>
      <div class="actions">
        <a class="button primary-button" href="harvest-admin.html">軌跡を登録</a>
        <a class="button" href="profile.html">プロフィール</a>
        <a class="button" href="records.html" data-records-link>最近の様子</a>
        <a class="button" href="analytics.html">アクセス解析</a>
      </div>
    </section>
    <section class="section form-card">
      <p class="eyebrow">最近の登録</p>
      <h2>登録済みの軌跡</h2>
      <div class="dashboard-list" data-dashboard-records></div>
    </section>
  </main>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
