<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ダッシュボード | やさいの背景</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-require-auth>
  <header class="site-header">
    <div class="app-shell header-inner">
      <a class="brand" href="dashboard.html"><span class="brand-mark">畑</span><span>やさいの背景<small data-farm-name>農園ダッシュボード</small></span></a>
      <nav class="main-nav" aria-label="メインナビゲーション">
        <a href="profile.html">プロフィール</a>
        <a href="harvest-admin.html">動画登録</a>
        <a href="analytics.html">アクセス解析</a>
        <button type="button" data-logout>ログアウト</button>
      </nav>
    </div>
  </header>
  <main class="app-shell">
    <section class="section">
      <div class="hero-card">
        <p class="eyebrow">農園管理</p>
        <h1>今日の畑を、売場へ届ける</h1>
        <p class="lead">ログイン中: <strong data-current-farm>確認中</strong></p>
        <div class="actions">
          <a class="button primary-button" href="harvest-admin.html">今日の畑動画を登録</a>
          <a class="button" href="profile.html">プロフィール編集</a>
          <a class="button" href="analytics.html">簡易アクセス解析</a>
        </div>
      </div>
    </section>
    <section class="section card">
      <h2>登録済みコンテンツ</h2>
      <div class="records-list" data-dashboard-records>
        <p class="note">読み込み中です。</p>
      </div>
    </section>
  </main>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
