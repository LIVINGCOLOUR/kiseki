<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>作り手ログイン | 軌跡</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="app-shell header-inner">
      <a class="brand" href="index.html"><span class="brand-mark">軌</span><span>軌跡<small>作り手だけがログインします</small></span></a>
    </div>
  </header>
  <main class="app-shell">
    <section class="section grid-2">
      <div class="form-card">
        <p class="eyebrow">作り手ログイン</p>
        <h1>管理キーで入る</h1>
        <p class="lead">Phase 1では、消費者アカウントを作りません。作り手だけがログインし、今日の軌跡とプロフィールを管理します。</p>
      </div>
      <form class="form-card form-grid" data-login-form>
        <div class="field">
          <label for="farmId">作り手ID</label>
          <select id="farmId" name="farmId" required>
            <option value="id-01">id-01</option>
            <option value="id-02">id-02</option>
            <option value="id-03">id-03</option>
            <option value="id-04">id-04</option>
            <option value="id-05">id-05</option>
          </select>
        </div>
        <div class="field">
          <label for="adminKey">管理キー</label>
          <input id="adminKey" name="adminKey" type="password" autocomplete="current-password" required />
          <p class="field-note">本番キーはCloudflare Pages Secretsで管理します。リポジトリには保存しません。</p>
        </div>
        <button class="button primary-button" type="submit">ログイン</button>
        <p class="status" data-login-status role="status"></p>
      </form>
    </section>
  </main>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
