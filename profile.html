<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>プロフィール編集 | 軌跡</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-require-auth>
  <header class="site-header">
    <div class="app-shell header-inner">
      <a class="brand" href="dashboard.html"><span class="brand-mark">軌</span><span>軌跡<small>プロフィール編集</small></span></a>
      <nav class="main-nav" aria-label="メインナビゲーション">
        <a href="dashboard.html">ダッシュボード</a>
        <a href="harvest-admin.html">動画登録</a>
        <a href="analytics.html">アクセス解析</a>
        <button type="button" data-logout>ログアウト</button>
      </nav>
    </div>
  </header>
  <main class="app-shell">
    <section class="section form-card">
      <p class="eyebrow">プロフィール</p>
      <h1>公開ページを整える</h1>
      <form class="form-grid" data-profile-form>
        <div class="field">
          <label for="profileName">名前</label>
          <input id="profileName" name="name" required />
        </div>
        <div class="field">
          <label for="profileArea">地域</label>
          <input id="profileArea" name="area" placeholder="例：茨城県石岡市八郷" />
        </div>
        <div class="field">
          <label for="profileDescription">紹介文</label>
          <textarea id="profileDescription" name="description" placeholder="活動のこと、大切にしていること、届けたい背景を書いてください。"></textarea>
        </div>
        <input type="hidden" name="imageUrl" />
        <div class="field">
          <label for="profileImageFile">代表写真をアップロード</label>
          <input id="profileImageFile" type="file" accept="image/*" data-profile-image />
          <p class="field-note">アップロードした写真はR2に保存され、公開プロフィールの代表写真として使われます。</p>
        </div>
        <div class="field profile-links-field">
          <label>関連リンク（サイト名とURL）</label>
          <p class="field-note">表示したいサイト名とURLを分けて入力してください。入力した分だけ公開ページに表示されます。最大10件まで登録できます。</p>
          <div class="profile-link-editor" data-profile-links-editor>
            <div class="profile-link-row" data-profile-link-row>
              <span>1</span>
              <input name="linkLabel" placeholder="例：公式サイト" aria-label="関連リンク1のサイト名" />
              <input name="linkUrl" type="url" placeholder="https://example.com" aria-label="関連リンク1のURL" />
            </div>
            <div class="profile-link-row" data-profile-link-row>
              <span>2</span>
              <input name="linkLabel" placeholder="例：Instagram" aria-label="関連リンク2のサイト名" />
              <input name="linkUrl" type="url" placeholder="https://example.com" aria-label="関連リンク2のURL" />
            </div>
            <div class="profile-link-row" data-profile-link-row>
              <span>3</span>
              <input name="linkLabel" placeholder="サイト名" aria-label="関連リンク3のサイト名" />
              <input name="linkUrl" type="url" placeholder="https://example.com" aria-label="関連リンク3のURL" />
            </div>
            <div class="profile-link-row" data-profile-link-row>
              <span>4</span>
              <input name="linkLabel" placeholder="サイト名" aria-label="関連リンク4のサイト名" />
              <input name="linkUrl" type="url" placeholder="https://example.com" aria-label="関連リンク4のURL" />
            </div>
            <div class="profile-link-row" data-profile-link-row>
              <span>5</span>
              <input name="linkLabel" placeholder="サイト名" aria-label="関連リンク5のサイト名" />
              <input name="linkUrl" type="url" placeholder="https://example.com" aria-label="関連リンク5のURL" />
            </div>
            <div class="profile-link-row" data-profile-link-row>
              <span>6</span>
              <input name="linkLabel" placeholder="サイト名" aria-label="関連リンク6のサイト名" />
              <input name="linkUrl" type="url" placeholder="https://example.com" aria-label="関連リンク6のURL" />
            </div>
            <div class="profile-link-row" data-profile-link-row>
              <span>7</span>
              <input name="linkLabel" placeholder="サイト名" aria-label="関連リンク7のサイト名" />
              <input name="linkUrl" type="url" placeholder="https://example.com" aria-label="関連リンク7のURL" />
            </div>
            <div class="profile-link-row" data-profile-link-row>
              <span>8</span>
              <input name="linkLabel" placeholder="サイト名" aria-label="関連リンク8のサイト名" />
              <input name="linkUrl" type="url" placeholder="https://example.com" aria-label="関連リンク8のURL" />
            </div>
            <div class="profile-link-row" data-profile-link-row>
              <span>9</span>
              <input name="linkLabel" placeholder="サイト名" aria-label="関連リンク9のサイト名" />
              <input name="linkUrl" type="url" placeholder="https://example.com" aria-label="関連リンク9のURL" />
            </div>
            <div class="profile-link-row" data-profile-link-row>
              <span>10</span>
              <input name="linkLabel" placeholder="サイト名" aria-label="関連リンク10のサイト名" />
              <input name="linkUrl" type="url" placeholder="https://example.com" aria-label="関連リンク10のURL" />
            </div>
          </div>
        </div>
        <label><input type="checkbox" name="isPublic" checked /> 公開する</label>
        <div class="actions">
          <button class="button primary-button" type="submit">保存する</button>
          <a class="button" href="farmer.html" data-profile-public-link>公開ページを見る</a>
        </div>
        <p class="status" data-profile-status role="status"></p>
      </form>
    </section>
  </main>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
